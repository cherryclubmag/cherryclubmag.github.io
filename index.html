<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CHERRY CLUB — 매거진</title>
<meta name="description" content="지금 잘 나가는 것만 골라주는 쇼핑 매거진. @cherry.clubs2">
<link rel="icon" href="logo.png">
<style>
  :root{
    --pink:#F06BA0; --pink-d:#D9457F; --pink-l:#FFE3EF;
    --ink:#4A2338; --ink-2:#8A6478; --line:#F6D6E4;
    --bg1:#FFF7FB; --bg2:#FDE9F2;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0; padding:28px 18px 56px;
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px;margin:0 auto}

  /* ── 헤더 ── */
  .logo{width:88px;height:88px;border-radius:50%;display:block;margin:0 auto 14px;
        object-fit:cover;box-shadow:0 8px 24px rgba(240,107,160,.28)}
  h1{margin:0;text-align:center;font-size:21px;letter-spacing:-.4px}
  .tag{margin:6px 0 0;text-align:center;font-size:10.5px;font-weight:800;
       letter-spacing:2.4px;color:var(--pink)}
  .desc{margin:12px 0 0;text-align:center;font-size:13.5px;line-height:1.7;color:var(--ink-2)}
  .ig{display:block;width:fit-content;margin:16px auto 0;font-size:12.5px;font-weight:700;
      color:var(--pink-d);text-decoration:none;border-bottom:1.5px solid var(--pink-l);padding-bottom:2px}

  /* ── DM 배너 ── */
  .dm{display:flex;align-items:center;gap:12px;margin:24px 0 22px;padding:15px 18px;
      border-radius:16px;text-decoration:none;color:#fff;
      background:linear-gradient(105deg,var(--pink) 0%, #FF9BC4 100%);
      box-shadow:0 6px 18px rgba(240,107,160,.30)}
  .dm b{display:block;font-size:14.5px}
  .dm span{display:block;font-size:11.5px;opacity:.92;margin-top:2px}
  .dm .arw{margin-left:auto;font-size:17px;opacity:.85}

  /* ── 탭 ── */
  .tabs{display:flex;gap:7px;margin-bottom:20px}
  .tab{flex:1;padding:9px 0;border:none;border-radius:999px;cursor:pointer;
       font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink-2);
       background:#fff;box-shadow:0 1px 5px rgba(200,120,160,.10);transition:.15s}
  .tab.on{background:var(--pink);color:#fff;box-shadow:0 4px 12px rgba(240,107,160,.32)}

  /* ── 호 리스트 (최신이 위) ── */
  .issues{display:flex;flex-direction:column;gap:11px}
  .issue{background:#fff;border-radius:16px;overflow:hidden;
         box-shadow:0 2px 10px rgba(200,120,160,.10);transition:box-shadow .18s}
  .issue.open{box-shadow:0 8px 24px rgba(240,107,160,.20)}

  .ihead{display:flex;align-items:center;gap:12px;padding:16px 17px;cursor:pointer;user-select:none}
  .no{flex:none;min-width:44px;font-size:15px;font-weight:900;color:var(--pink);
      letter-spacing:-.3px;font-variant-numeric:tabular-nums}
  .itxt{flex:1;min-width:0}
  .ittl{font-size:14.5px;font-weight:700;line-height:1.4;letter-spacing:-.3px;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .imeta{margin-top:3px;font-size:11px;color:var(--ink-2)}
  .imeta em{font-style:normal;color:var(--pink-d);font-weight:700}
  .chev{flex:none;font-size:11px;color:var(--pink);transition:transform .2s}
  .issue.open .chev{transform:rotate(180deg)}

  .ibody{display:none;padding:0 17px 15px}
  .issue.open .ibody{display:block}

  /* ── 아이템 ── */
  .item{display:flex;align-items:center;gap:10px;padding:11px 12px;margin-top:7px;
        border-radius:11px;background:#FFF6FA;text-decoration:none;color:var(--ink);
        border:1px solid transparent;transition:.15s}
  a.item:hover{background:var(--pink-l);border-color:var(--line)}
  .idx{flex:none;width:19px;font-size:11px;font-weight:900;color:var(--pink);
       font-variant-numeric:tabular-nums;opacity:.75}
  .iname{flex:1;min-width:0;font-size:13px;line-height:1.45;letter-spacing:-.2px}
  .go{flex:none;font-size:11px;font-weight:800;color:var(--pink-d);white-space:nowrap}
  .item.soon{opacity:.62;cursor:default}
  .item.soon .go{color:var(--ink-2);font-weight:600}

  .post{display:block;margin-top:11px;padding:9px 0;text-align:center;border-radius:10px;
        font-size:11.5px;font-weight:700;text-decoration:none;
        color:var(--pink-d);background:var(--pink-l)}

  .empty{padding:44px 20px;text-align:center;font-size:13px;color:var(--ink-2);
         background:#fff;border-radius:16px}

  /* ── 푸터 ── */
  footer{margin-top:30px;text-align:center}
  .disc{display:inline-block;padding:6px 13px;border-radius:999px;background:var(--pink-l);
        font-size:10.5px;font-weight:700;color:var(--pink-d)}
  .fine{margin:9px 0 0;font-size:10.5px;line-height:1.7;color:var(--ink-2);opacity:.85}
</style>
</head>
<body>
<div class="wrap">

  <img class="logo" src="logo.png" alt="CHERRY CLUB">
  <h1>@cherry.clubs2</h1>
  <p class="tag">CUTE IS THE RULE</p>
  <p class="desc">지금 잘 나가는 것만 골라주는 쇼핑 매거진.<br>살까 말까 하는 고민을 줄여드려요.</p>
  <a class="ig" id="ig" href="#" target="_blank" rel="noopener">인스타그램 보러가기 →</a>

  <a class="dm" href="https://ig.me/m/cherry.clubs2" target="_blank" rel="noopener">
    <div><b>찾는 아이템 있으세요?</b><span>DM 주시면 대신 골라드려요</span></div>
    <div class="arw">›</div>
  </a>

  <div class="tabs">
    <button class="tab on" data-c="all">전체</button>
    <button class="tab" data-c="fashion">👗 패션</button>
    <button class="tab" data-c="beauty">💄 뷰티</button>
  </div>

  <div class="issues" id="list"></div>

  <footer>
    <span class="disc">일부 링크는 제휴 링크입니다</span>
    <p class="fine">구매 시 수수료를 받을 수 있으며, 가격은 동일합니다.<br>© CHERRY CLUB</p>
  </footer>
</div>

<script>
const TRACK = "https://peppy-duck-1231.navlafilm-sys.deno.net/c";
const CAT   = { fashion:"👗 패션", beauty:"💄 뷰티" };
let ISSUES = [], cur = "all";

const esc = s => (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const track = (id, url) => TRACK + "?id=" + encodeURIComponent(id) + "&u=" + encodeURIComponent(url);

function render(){
  const list = document.getElementById("list");
  const rows = ISSUES.filter(i => cur === "all" || i.cat === cur);

  if(!rows.length){
    list.innerHTML = '<div class="empty">곧 새로운 호가 올라와요 🍒</div>';
    return;
  }

  list.innerHTML = rows.map((is, n) => {
    const items = (is.items || []).map((it, k) => {
      const idx = String(k + 1).padStart(2, "0");
      if(!it.url){
        return '<div class="item soon"><span class="idx">' + idx + '</span>'
             + '<span class="iname">' + esc(it.name) + '</span>'
             + '<span class="go">준비중</span></div>';
      }
      const href = track(is.no + "-" + (k + 1), it.url);
      return '<a class="item" href="' + esc(href) + '" target="_blank" rel="noopener sponsored">'
           + '<span class="idx">' + idx + '</span>'
           + '<span class="iname">' + esc(it.name) + '</span>'
           + '<span class="go">보러가기 ›</span></a>';
    }).join("");

    const post = is.permalink
      ? '<a class="post" href="' + esc(track(is.no + "-post", is.permalink)) + '" target="_blank" rel="noopener">📷 인스타에서 이 호 보기</a>'
      : "";

    return '<div class="issue' + (n === 0 ? " open" : "") + '">'
      + '<div class="ihead" onclick="this.parentNode.classList.toggle(\'open\')">'
        + '<div class="no">' + esc(is.no) + '호</div>'
        + '<div class="itxt">'
          + '<div class="ittl">' + esc(is.title) + '</div>'
          + '<div class="imeta"><em>' + (CAT[is.cat] || "") + '</em> · 상품 '
          + (is.items || []).length + '개 · ' + esc(is.date) + '</div>'
        + '</div>'
        + '<div class="chev">▼</div>'
      + '</div>'
      + '<div class="ibody">' + (items || '<div class="item soon"><span class="iname">상품 정리 중이에요</span></div>') + post + '</div>'
    + '</div>';
  }).join("");
}

document.querySelectorAll(".tab").forEach(b => b.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  cur = b.dataset.c;
  render();
});

fetch("links.json?t=" + Date.now())
  .then(r => r.json())
  .then(d => {
    ISSUES = (d.issues || []).sort((a, b) => (b.no || "").localeCompare(a.no || ""));
    const ig = (d.social || []).find(s => s.label === "instagram");
    if(ig) document.getElementById("ig").href = ig.url;
    render();
  })
  .catch(() => render());
</script>
</body>
</html>
